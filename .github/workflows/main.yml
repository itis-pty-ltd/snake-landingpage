name: Enable farewell redirect

on:
  schedule:
    # 12:00am Monday AEST = 2:00pm Sunday UTC
    - cron: "42 8 30 5 *"
  workflow_dispatch:

jobs:
  enable-redirect:
    runs-on: ubuntu-latest

    steps:
      - name: Enable Cloudflare redirect rule
        run: |
          curl -X PATCH \
            "https://api.cloudflare.com/client/v4/zones/${{ secrets.CF_ZONE_ID }}/rulesets/${{ secrets.CF_RULESET_ID }}/rules/${{ secrets.CF_RULE_ID }}" \
            -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data '{
              "enabled": true,
              "description": "Farewell redirect",
              "expression": "(http.host in {\"snakeracing.com.au\" \"www.snakeracing.com.au\"})",
              "action": "redirect",
              "action_parameters": {
                "from_value": {
                  "status_code": 302,
                  "target_url": {
                    "expression": "concat(\"https://farewell.snakeracing.com.au\", http.request.uri.path)"
                  },
                  "preserve_query_string": true
                }
              }
            }'
